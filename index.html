    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            /* 确保body本身可以滚动，但我们将滚动主要交给内部容器，保留全屏弹性 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .metro-gradient {
            background: linear-gradient(135deg, #003060 0%, #055a44 100%);
        }

        /* 官方线路标准色映射（用于边框装饰） */
        line-1 { border-left: 10px solid #00ab39; }
        line-2 { border-left: 10px solid #db6d1c; }
        line-3 { border-left: 10px solid #00a2e1; }
        line-4 { border-left: 10px solid #dc241f; }
        line-5 { border-left: 10px solid #9950b2; }
        line-6 { border-left: 10px solid #3abca8; }
        line-7 { border-left: 10px solid #0035ad; }
        line-8 { border-left: 10px solid #db6d1c; }
        line-9 { border-left: 10px solid #846e74; }
        line-10 { border-left: 10px solid #f8779e; }
        line-11 { border-left: 10px solid #6a1d44; }
        line-12 { border-left: 10px solid #a192b2; }
        line-13 { border-left: 10px solid #de7c00; }
        line-14 { border-left: 10px solid #f2c75c; }
        line-16 { border-left: 10px solid #144490; }
        line-20 { border-left: 10px solid #88dbdf; }

        .modal-bg { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
        #timer-bar { transition: width 1s linear; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        /* 修复滚动问题: 主容器最大高度限制并启用overflow-y auto */
        .scrollable-container {
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        
        /* 确保内边距舒适且内容不被裁剪 */
        .quiz-scroll-area {
            overflow-y: auto;
            max-height: calc(85vh - 2rem);
        }
        
        /* 针对结果界面确保长内容可滚动 */
        .result-scroll {
            overflow-y: auto;
            max-height: 85vh;
        }
        
        /* 隐藏滚动条可选（提升美观）但保留功能性 */
        .scrollable-container::-webkit-scrollbar {
            width: 5px;
        }
        .scrollable-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .scrollable-container::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        /* 选项按钮样式保持原味 */
        .option-btn {
            transition: all 0.2s ease;
        }

        /* 菜单 Tab 切换动画 */
        #tab-content {
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

            "8": { name: "8 号线 · 逐梦之人", desc: "内心永远住着大海。你浪漫、包容，在现实生活中保留着对远方的向往。", class: "line-8" },
            "9": { name: "9 号线 · 梅林隐者", desc: "低调内敛，大隐隐于市。你不求虚名，却在关键时刻发挥着巨大的支撑作用。", class: "line-9" },
            "10": { name: "10 号线 · 跨越之星", desc: "意志坚定，抗压能力惊人。面对重重困难，你选择加速跨越。", class: "line-10" },
            "11": { name: "11 号线 · 极速精英", desc: "效率至上，注重感官体验。你追求最快的速度和最高质量的生活。", class: "line-11" },
            "12": { name: "12 号线 · 换乘王者", desc: "包容万象，社交圈极其广。你能平衡各方需求，让复杂的关系井然有序。", class: "line-12" },
            "13": { name: "13 号线 · 未来橙光", desc: "乐观开朗，永远带给人惊喜。你是那种还未登场就让人充满期待的焦点。", class: "line-13" },
            "14": { name: "14 号线 · 智能极客", desc: "高智商、数字化。你崇尚自动化和逻辑，追求极致的精准和效率。", class: "line-14" },
            "16": { name: "16 号线 · 文化传承", desc: "重情重义，守护乡愁。你在现代科技中融入了深厚的人文关怀。", class: "line-16" },
            "20": { name: "20 号线 · 智行先驱", desc: "先行者，勇敢迈向无人区。你代表着最尖端的探索和不妥协的勇气。", class: "line-20" }
        };

        let state = {
            view: 'menu',
            mode: 'easy',
            currentQuestions: [],
            currentIdx: 0,
            score: 0,
            timer: null,
            timeLeft: 15
        };

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function closeDisclaimer() {
            document.getElementById('disclaimer-modal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            app.init();
        }

        const app = {
            init() { this.render(); },

            render() {
                const container = document.getElementById('main-container');
                if (!container) return;
                container.innerHTML = '';
                if (state.view === 'menu') this.renderMenu(container);
                else if (state.view === 'quiz') this.renderQuiz(container);
                else if (state.view === 'result') this.renderResult(container);
            },

            renderMenu(container) {
                const high = localStorage.getItem('sz_metro_high_score') || 0;
                if (!state.menuTab) state.menuTab = 'basic';
                container.innerHTML = `
                    <div class="metro-gradient p-12 text-white text-center animate-fade">
                        <div class="inline-block px-3 py-1 bg-white/20 rounded-full text-[10px] font-bold tracking-widest uppercase mb-4">品 质 胶 桶 （划掉）</div>
                        <h1 class="text-3xl font-black mb-2 tracking-tighter">深圳地铁小测验</h1>
                        <p class="text-xs opacity-60">你对深圳地铁有何了解呢？</p>
                    </div>
                    <div class="p-8 animate-fade">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold text-gray-800">选择难度</h2>
                            <div class="text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">最高分: ${high}</div>
                        </div>
                        <div class="flex gap-1 mb-5 p-1 bg-gray-100/80 rounded-2xl">
                            <button data-tab="basic" onclick="app.switchTab('basic')" class="menu-tab-pill flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 ${state.menuTab === 'basic' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-400 hover:text-gray-600'}">基本</button>
                            <button data-tab="ext" onclick="app.switchTab('ext')" class="menu-tab-pill flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 ${state.menuTab === 'ext' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-400 hover:text-gray-600'}">扩展</button>
                        </div>
                        <div id="tab-content" class="space-y-4 pb-6">
                            ${this.getTabContent()}
                        </div>
                    </div>
                `;
            },

            getTabContent() {
                if (state.menuTab === 'basic') {
                    return `
                        <h2 class="text-m font-bold text-gray-400 mb-2">覆盖整个深圳地铁，每个难度包含三套题库</h2>
                        <button onclick="app.startQuiz('easy')" class="w-full text-left p-6 rounded-[2rem] border-2 border-emerald-50 bg-white/40 hover:border-emerald-500 hover:bg-white transition-all shadow-sm">
                            <h3 class="text-lg font-bold text-emerald-700">🟢 啊~简单点的</h3>
                            <p class="text-xs text-gray-500 mt-2">覆盖主要线路与常识。</p>
                        </button>
                        <button onclick="app.startQuiz('hard')" class="w-full text-left p-6 rounded-[2rem] border-2 border-rose-50 bg-white/40 hover:border-rose-500 hover:bg-white transition-all shadow-sm">
                            <h3 class="text-lg font-bold text-rose-700">🔴 我要难的！！！</h3>
                            <p class="text-xs text-gray-500 mt-2">覆盖技术、信号、工程及深铁发展史。</p>
                        </button>
                    `;
                } else {
                    return `
                        <h2 class="text-m font-bold text-gray-400 mb-2">覆盖了个别线路，每一个难度只有一套题库。持续更新qwq</h2>
                        <button onclick="app.startQuiz('metroL4')" class="w-full text-left p-6 rounded-[2rem] border-2 border-red-50 bg-white/40 hover:border-red-500 hover:bg-white transition-all shadow-sm">
                            <h3 class="text-lg font-bold" style="color:#dc241f">🔴 4号线</h3>
                            <p class="text-xs text-gray-500 mt-2">某个港铁深圳米叫我做这个，我做了。</p>
                        </button>
                        <button onclick="app.startQuiz('line7')" class="w-full text-left p-6 rounded-[2rem] border-2 border-blue-50 bg-white/40 hover:border-blue-500 hover:bg-white transition-all shadow-sm">
                            <h3 class="text-lg font-bold" style="color:#0035ad">🔵 7号线</h3>
                            <p class="text-xs text-gray-500 mt-2">狗椅狗都不坐，快倒闭</p>
                        </button>
                        <button onclick="app.startQuiz('line11')" 
                            class="w-full text-left p-6 rounded-[2rem] border-2 border-gray-100 bg-white/40 
                            hover:border-[#6a1d44] hover:bg-white transition-all shadow-sm">
                            <h3 class="text-lg font-bold" style="color:#6a1d44">🟤 11号线专题</h3>
                            <p class="text-xs text-gray-500 mt-2">啊啊啊啊~猫好烧！！！！！</p>
                        </button>
                    `;
                }
            },

            switchTab(tab) {
                if (state.menuTab === tab) return;
                const content = document.getElementById('tab-content');
                document.querySelectorAll('.menu-tab-pill').forEach(btn => {
                    const active = btn.dataset.tab === tab;
                    btn.className = `menu-tab-pill flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 ${active ? 'bg-white shadow-sm text-gray-800' : 'text-gray-400 hover:text-gray-600'}`;
                });
                if (content) {
                    content.style.opacity = '0';
                    content.style.transform = 'translateY(8px)';
                    setTimeout(() => {
                        state.menuTab = tab;
                        content.innerHTML = this.getTabContent();
                        content.style.opacity = '1';
                        content.style.transform = 'translateY(0)';
                    }, 220);
                }
            },

            startQuiz(mode) {
                if (state.timer) clearInterval(state.timer);
                state.view = 'quiz';
                state.mode = mode;
                state.currentIdx = 0;
                state.score = 0;
                const pool = QUESTION_POOLS[mode];
                const randomSet = pool[Math.floor(Math.random() * pool.length)];
                state.currentQuestions = randomSet;
                this.render();
            },

            startTimer() {
                if (state.timer) clearInterval(state.timer);
                state.timeLeft = 15;
                const bar = document.getElementById('timer-bar');
                if (bar) bar.style.width = '100%';
                
                state.timer = setInterval(() => {
                    state.timeLeft--;
                    const currentBar = document.getElementById('timer-bar');
                    if (currentBar) currentBar.style.width = (state.timeLeft / 15 * 100) + '%';
                    if (state.timeLeft <= 0) {
                        clearInterval(state.timer);
                        this.submitAnswer({ score: 0 });
                    }
                }, 1000);
            },

            submitAnswer(opt) {
                clearInterval(state.timer);
                state.score += (opt.score || 0);
                
                if (state.currentIdx < state.currentQuestions.length - 1) {
                    state.currentIdx++;
                    this.render();
                } else {
                    state.view = 'result';
                    this.render();
                }
            },

            renderQuiz(container) {
                const q = state.currentQuestions[state.currentIdx];
                const shuffledOpts = shuffle(q.options);
                const progress = ((state.currentIdx + 1) / state.currentQuestions.length) * 100;
                
                container.innerHTML = `
                    <div class="p-8 flex flex-col min-h-full">
                        <div class="w-full h-1 bg-gray-100 rounded-full mb-8 overflow-hidden">
                            <div id="timer-bar" class="h-full bg-blue-600 w-full" style="width:100%"></div>
                        </div>
                        <div class="flex justify-between items-start mb-8 flex-wrap gap-2">
                            <div>
                                <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Question ${state.currentIdx + 1} / 15</span>
                                <h3 class="text-2xl font-black text-gray-900 mt-1">${state.mode === 'easy' ? '简单点的' : state.mode === 'hard' ? '难点的' : state.mode === 'metroL4' ? '4号线' : state.mode === 'line7' ? '7号线' : '11号线'}测题</h3>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-gray-200">${Math.round(progress)}%</div>
                            </div>
                        </div>
                        <div class="flex-grow">
                            <h2 class="text-lg font-bold text-gray-800 mb-8 leading-relaxed">${q.q}</h2>
                            <div id="options-container" class="space-y-3 pb-6"></div>
                        </div>
                    </div>
                `;
                
                const box = container.querySelector('#options-container');
                if (box) {
                    shuffledOpts.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.className = "w-full text-left p-5 rounded-2xl border border-gray-100 bg-white/60 hover:border-blue-600 hover:bg-white hover:shadow-xl hover:-translate-y-1 transition-all flex items-center group option-btn";
                        btn.onclick = () => this.submitAnswer(opt);
                        btn.innerHTML = `
                            <div class="w-10 h-10 rounded-xl bg-gray-50 group-hover:bg-blue-600 group-hover:text-white flex items-center justify-center mr-4 text-xs font-black transition-colors shrink-0">${String.fromCharCode(65+idx)}</div>
                            <span class="text-gray-600 font-bold group-hover:text-blue-900 text-sm leading-tight">${opt.t}</span>
                        `;
                        box.appendChild(btn);
                    });
                }
                this.startTimer();
            },

            renderResult(container) {
                const high = localStorage.getItem('sz_metro_high_score') || 0;
                if (state.score > high) localStorage.setItem('sz_metro_high_score', state.score);

                let destinyId = "1";
                const s = state.score;
                if (s >= 140) destinyId = "13";
                else if (s >= 128) destinyId = "20";
                else if (s >= 119) destinyId = "16";
                else if (s >= 110) destinyId = "14";
                else if (s >= 101) destinyId = "12";
                else if (s >= 92) destinyId = "10";
                else if (s >= 83) destinyId = "6";
                else if (s >= 74) destinyId = "11";
                else if (s >= 65) destinyId = "9";
                else if (s >= 56) destinyId = "7";
                else if (s >= 47) destinyId = "6";
                else if (s >= 38) destinyId = "5";
                else if (s >= 29) destinyId = "4";
                else if (s >= 20) destinyId = "3";
                else if (s >= 11) destinyId = "2";
                else destinyId = "1";             

                const profile = PROFILES[destinyId];

                container.innerHTML = `
                    <div class="p-10 text-center animate-fade">
                        <div class="inline-block px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold uppercase mb-6 tracking-widest">测验结束</div>
                        <div class="w-24 h-24 bg-white/80 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl border border-blue-50">
                            <div class="text-4xl font-black text-blue-600">${state.score}</div>
                        </div>
                        <h2 class="text-xl font-bold text-gray-400 mb-2">根据结果，推算出你的本命线路可能是</h2>
                        <div class="flex justify-center mb-6">
                            <span class="px-8 py-3 rounded-full text-white text-2xl font-black shadow-lg" style="background-color: ${LINE_COLORS[destinyId] || '#555'}">
                                ${destinyId} 号线
                            </span>
                        </div>
                        <div class="p-4 rounded-[2rem] bg-white/50 border border-white mb-8 ${profile.class} shadow-inner text-left">
                            <h5 class="text-sm font-bold text-gray-400 mb-2">（注：线路按照开通时期为基准计算，分数越高，则出现的线路开通越近）</h5>                       
                        </div>
                        <div class="p-8 rounded-[2rem] bg-white/50 border border-white mb-8 ${profile.class} shadow-inner text-left">
                            <p class="text-gray-600 leading-relaxed text-sm font-medium italic">“${profile.desc}”</p>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="p-4 bg-gray-50/50 rounded-2xl border border-white text-center">
                                <div class="text-[10px] text-gray-400 uppercase font-bold">正确率</div>
                                <div class="text-xl font-black text-gray-700">${Math.round(state.score/1.5)}%</div>
                            </div>
                            <div class="p-4 bg-gray-50/50 rounded-2xl border border-white text-center">
                                <div class="text-[10px] text-gray-400 uppercase font-bold">最高纪录</div>
                                <div class="text-xl font-black text-gray-700">${high}</div>
                            </div>
                        </div>
                        <button onclick="location.reload()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-black hover:bg-black transition-all shadow-xl active:scale-95">
                            再测一次
                        </button>
                    </div>
                `;
            }
        };
        window.app = app;
        window.closeDisclaimer = closeDisclaimer;
    </script>
</body>
</html

                    { q: "10 号线通过鸡公山隧道的主要技术是？", options: [{ t: "盾构法", score: 10, weight: "10" }, { t: "矿山法", score: 0, weight: "10" }, { t: "定向爆破", score: 0, weight: "10" }, { t: "以上皆是", score: 10, weight: "10" }] }
                ],
                // 硬核版 - 题库 2 & 3 可按此逻辑继续扩展
                [
                    { q: "硬核测验 - 轨道几何尺寸静态标准中，轨距允许偏差为？", options: [{ t: "+3, -2 mm", score: 10, weight: "1" }, { t: "±10 mm", score: 0, weight: "4" }, { t: "±1 mm", score: 0, weight: "11" }, { t: "无偏差", score: 0, weight: "14" }] }
                ].concat(Array(14).fill({ q: "硬核版题库2 - 技术占位题目", options: [{ t: "专业项", score: 10, weight: "14" }, { t: "错误项", score: 0, weight: "1" }, { t: "干扰项", score: 0, weight: "11" }, { t: "无关项", score: 0, weight: "20" }] })),
                [
                    { q: "硬核测验 - 深圳地铁接触网额定电压的波动范围是？", options: [{ t: "1000V-1800V", score: 10, weight: "1" }, { t: "500V-2000V", score: 0, weight: "3" }, { t: "恒定1500V", score: 0, weight: "11" }, { t: "无限制", score: 0, weight: "14" }] }
                ].concat(Array(14).fill({ q: "硬核版题库3 - 技术占位题目", options: [{ t: "核心项", score: 10, weight: "20" }, { t: "表层项", score: 0, weight: "1" }, { t: "数值项", score: 0, weight: "11" }, { t: "逻辑项", score: 0, weight: "14" }] }))
            ]
        };

        const PROFILES = {
            "1": { name: "1 号线 · 城市之脊", desc: "你是最可靠的基石，性格沉稳、守时，是所有人心中最值得信任的“老大哥”。（2004年开通，历史悠久）", class: "line-1" },
            "2": { name: "2 号线 · 滨海格调", desc: "追求生活品质，温润如玉。你懂得享受优雅，总能从容地穿越繁华。 (2010年开通，优雅安逸)", class: "line-2" },
            "3": { name: "3 号线 · 独行侠客", desc: "即使身处高架、忍受噪音，你依然能走出自己的节奏。你不怕与众不同。(2010年开通，个性鲜明)", class: "line-3" },
            "4": { name: "4 号线 · 脉动之心", desc: "充满活力，时刻准备迎接挑战。你是连接各方的枢纽，生命力极强。(2004年开通，能量充沛)", class: "line-4" },
            "5": { name: "5 号线 · 环中使者", desc: "人脉广阔，擅长整合资源。你能巧妙地连接看似不相干的事物。(2011年开通，逻辑严密)", class: "line-5" },
            "6": { name: "6 号线 · 光明卫士", desc: "向往科学与未来，眼光长远。你正在飞速成长，是大家眼中的明日之星。(2020年开通，追求卓越)", class: "line-6" },
            "7": { name: "7 号线 · 蓝色绅士", desc: "文质彬彬，专业度极高。你做事缜密，总能用最合理的逻辑解决复杂难题。(2016年开通，专业克制)", class: "line-7" },
            "8": { name: "8 号线 · 逐梦之人", desc: "内心永远住着大海。你浪漫、包容，在现实生活中保留着对远方的向往。(2020年开通，向往自由)", class: "line-8" },
            "9": { name: "9 号线 · 梅林隐者", desc: "低调内敛，大隐隐于市。你不求虚名，却在关键时刻发挥着巨大的支撑作用。(2016年开通，踏实稳重)", class: "line-9" },
            "10": { name: "10 号线 · 跨越之星", desc: "意志坚定，抗压能力惊人。面对重重困难，你选择加速跨越。(2020年开通，敢于突破)", class: "line-10" },
            "11": { name: "11 号线 · 极速精英", desc: "效率至上，注重感官体验。你追求最快的速度和最高质量的生活。(2016年开通，高端极速)", class: "line-11" },
            "12": { name: "12 号线 · 换乘王者", desc: "包容万象，社交圈极其广。你能平衡各方需求，让复杂的关系井然有序。(2022年开通，包容平衡)", class: "line-12" },
            "13": { name: "13 号线 · 未来橙光", desc: "乐观开朗，永远带给人惊喜。你是那种还未登场就让人充满期待的焦点。(即将开通，充满惊喜)", class: "line-13" },
            "14": { name: "14 号线 · 智能极客", desc: "高智商、数字化。你崇尚自动化和逻辑，追求极致的精准和效率。(2022年开通，科技前沿)", class: "line-14" },
            "16": { name: "16 号线 · 文化传承", desc: "重情重义，守护乡愁。你在现代科技中融入了深厚的人文关怀。(2022年开通，温润如墨)", class: "line-16" },
            "20": { name: "20 号线 · 智行先驱", desc: "先行者，勇敢迈向无人区。你代表着最尖端的探索和不妥协的勇气。(2021年开通，无人驾驶先锋)", class: "line-20" }
        };

        let state = {
            view: 'menu',
            mode: 'easy',
            currentQuestions: [],
            currentIdx: 0,
            score: 0,
            weights: {},
            timer: null,
            timeLeft: 15
        };

        const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        function closeDisclaimer() {
            document.getElementById('disclaimer-modal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            app.init();
        }

        const app = {
            init() { this.render(); },

            render() {
                const container = document.getElementById('main-container');
                container.innerHTML = '';
                if (state.view === 'menu') this.renderMenu(container);
                else if (state.view === 'quiz') this.renderQuiz(container);
                else if (state.view === 'result') this.renderResult(container);
            },

            renderMenu(container) {
                const high = localStorage.getItem('sz_metro_high_score') || 0;
                container.innerHTML = `
                    <div class="metro-gradient p-10 text-white text-center animate-fade">
                        <h1 class="text-3xl font-black mb-2 tracking-tighter">深圳地铁大测验</h1>
                        <p class="text-xs opacity-60 uppercase tracking-[0.2em]">6套随机题库 · 选项随机化</p>
                    </div>
                    <div class="p-8 animate-fade">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold text-gray-800">选择难度</h2>
                            <div class="text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">最高分: ${high}</div>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            <button onclick="app.startQuiz('easy')" class="w-full text-left p-6 rounded-3xl border-2 border-green-50 bg-green-50/30 hover:border-green-500 hover:bg-white transition-all group">
                                <h3 class="text-lg font-bold text-green-700">🟢 入门版 (15题)</h3>
                                <p class="text-xs text-gray-500 mt-2">每次开始随机抽取 3 套题库之一。</p>
                            </button>
                            <button onclick="app.startQuiz('hard')" class="w-full text-left p-6 rounded-3xl border-2 border-red-50 bg-red-50/30 hover:border-red-500 hover:bg-white transition-all group">
                                <h3 class="text-lg font-bold text-red-700">🔴 硬核版 (15题)</h3>
                                <p class="text-xs text-gray-500 mt-2">极高难度，涉及技术、信号与工程细节。</p>
                            </button>
                        </div>
                        <p class="mt-8 text-[10px] text-gray-300 text-center uppercase tracking-widest leading-loose">
                            AI Constructed · Multi-Pool Engine v2.0
                        </p>
                    </div>
                `;
            },

            renderQuiz(container) {
                const q = state.currentQuestions[state.currentIdx];
                const shuffledOpts = shuffle(q.options);
                const progress = ((state.currentIdx + 1) / state.currentQuestions.length) * 100;
                
                container.innerHTML = `
                    <div class="p-8 h-[520px] flex flex-col animate-fade">
                        <div class="w-full h-1 bg-gray-100 rounded-full mb-6 overflow-hidden">
                            <div id="timer-bar" class="h-full bg-blue-500 w-full"></div>
                        </div>
                        <div class="flex justify-between items-end mb-8">
                            <div>
                                <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Question ${state.currentIdx + 1}</span>
                                <h3 class="text-xl font-black text-gray-800 mt-1">${state.mode === 'easy' ? '入门测验' : '硬核挑战'}</h3>
                            </div>
                            <div class="text-right">
                                <span class="text-lg font-black text-gray-200">${Math.round(progress)}%</span>
                            </div>
                        </div>
                        <div class="flex-grow">
                            <h2 class="text-lg font-bold text-gray-700 mb-6 leading-relaxed">${q.q}</h2>
                            <div id="options-container" class="grid grid-cols-1 gap-3"></div>
                        </div>
                    </div>
                `;
                
                const box = container.querySelector('#options-container');
                shuffledOpts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 rounded-2xl border border-gray-100 bg-white hover:border-blue-500 hover:shadow-md transition-all flex items-center group";
                    btn.onclick = () => this.submitAnswer(opt);
                    btn.innerHTML = `
                        <div class="w-8 h-8 rounded-lg bg-gray-50 group-hover:bg-blue-600 group-hover:text-white flex items-center justify-center mr-4 text-xs font-black transition-colors">${String.fromCharCode(65+idx)}</div>
                        <span class="text-gray-600 font-bold group-hover:text-blue-700">${opt.t}</span>
                    `;
                    box.appendChild(btn);
                });
                this.startTimer();
            },

            renderResult(container) {
                const high = localStorage.getItem('sz_metro_high_score') || 0;
                const isNewRecord = state.score > high;
                if (isNewRecord) localStorage.setItem('sz_metro_high_score', state.score);

                let destinyId = "1";
                let maxW = -1;
                for (let id in state.weights) {
                    if (state.weights[id] > maxW) { maxW = state.weights[id]; destinyId = id; }
                }
                const profile = PROFILES[destinyId] || PROFILES["1"];

                container.innerHTML = `
                    <div class="p-10 text-center animate-fade">
                        <div class="inline-block p-4 bg-gray-50 rounded-full mb-4">
                            <div class="text-5xl font-black text-gray-900">${state.score}</div>
                        </div>
                        <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-8">Score (Max 150)</p>
                        
                        <div class="mt-4 bg-white rounded-[2.5rem] p-10 border-l-[12px] text-left shadow-2xl ${profile.class} relative overflow-hidden">
                            <p class="text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest">本命线路 · Spirit Route</p>
                            <h3 class="text-3xl font-black mb-6 text-gray-800 leading-tight">${profile.name}</h3>
                            <p class="text-gray-500 leading-loose text-sm font-medium">"${profile.desc}"</p>
                        </div>

                        <div class="mt-12 grid grid-cols-2 gap-4">
                            <button onclick="app.reset()" class="py-5 bg-gray-900 text-white rounded-3xl font-black hover:bg-blue-900 transition-all shadow-xl">再测一次</button>
                            <button onclick="window.print()" class="py-5 bg-gray-100 text-gray-400 rounded-3xl font-black">存为证书</button>
                        </div>
                    </div>
                `;
            },

            startQuiz(mode) {
                state.view = 'quiz';
                state.mode = mode;
                const pool = QUESTION_POOLS[mode];
                state.currentQuestions = pool[Math.floor(Math.random() * pool.length)];
                state.currentIdx = 0;
                state.score = 0;
                state.weights = {};
                this.render();
            },

            submitAnswer(opt) {
                clearInterval(state.timer);
                state.score += (opt.score || 0);
                if (opt.weight) state.weights[opt.weight] = (state.weights[opt.weight] || 0) + 1;
                state.currentIdx++;
                if (state.currentIdx < state.currentQuestions.length) setTimeout(() => this.render(), 150);
                else { state.view = 'result'; this.render(); }
            },

            startTimer() {
                clearInterval(state.timer);
                state.timeLeft = 15;
                const bar = document.getElementById('timer-bar');
                state.timer = setInterval(() => {
                    state.timeLeft--;
                    if (bar) bar.style.width = `${(state.timeLeft / 15) * 100}%`;
                    if (state.timeLeft <= 0) this.submitAnswer({ score: 0 });
                }, 1000);
            },

            reset() { state.view = 'menu'; this.render(); }
        };
    </script>
</body>
</html>

                        </div>
                    </div>
                `;
            },

            startQuiz(mode) {
                state.view = 'quiz';
                state.mode = mode;
                const pools = QUESTION_POOLS[mode];
                // 随机选择三套题库中的一套
                state.currentQuestions = pools[Math.floor(Math.random() * pools.length)];
                state.currentIdx = 0;
                state.score = 0;
                state.weights = {};
                this.render();
            },

            submitAnswer(opt) {
                clearInterval(state.timer);
                state.score += (opt.score || 0);
                if (opt.weight) state.weights[opt.weight] = (state.weights[opt.weight] || 0) + 1;
                state.currentIdx++;
                if (state.currentIdx < state.currentQuestions.length) {
                    setTimeout(() => this.render(), 150);
                } else {
                    state.view = 'result';
                    this.render();
                }
            },

            startTimer() {
                clearInterval(state.timer);
                state.timeLeft = 15;
                const bar = document.getElementById('timer-bar');
                state.timer = setInterval(() => {
                    state.timeLeft--;
                    if (bar) bar.style.width = `${(state.timeLeft / 15) * 100}%`;
                    if (state.timeLeft <= 0) this.submitAnswer({ score: 0 });
                }, 1000);
            },

            reset() { state.view = 'menu'; this.render(); }
        };
    </script>
</body>
</html>

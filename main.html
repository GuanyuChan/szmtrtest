    <style>

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f3f4f6;
            overflow-x: hidden;
        }

        .metro-gradient {

        }

        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-slide {
            animation: slideIn 0.4s ease-out forwards;
        }

        /* 线路动态边框颜色 */
        .line-1 { border-left: 8px solid #00ab39; }
        .line-2 { border-left: 8px solid #db8e00; }
        .line-3 { border-left: 8px solid #00a1e4; }
        .line-4 { border-left: 8px solid #db3127; }
        .line-5 { border-left: 8px solid #996c33; }
        .line-6 { border-left: 8px solid #31958b; }
        .line-7 { border-left: 8px solid #00368c; }
        .line-8 { border-left: 8px solid #f296bc; }
        .line-9 { border-left: 8px solid #856a4d; }
        .line-10 { border-left: 8px solid #0093d3; }
        .line-11 { border-left: 8px solid #6a1d44; }

</head>

                    { q: "12 号线具备的检测技术是？", options: [{ t: "轮轨智能诊断", score: 10, weight: "12" }, { t: "全自动擦窗", score: 0, weight: "20" }, { t: "声控发车", score: 0, weight: "14" }, { t: "红外感知人数", score: 0, weight: "1" }] },

                ]

            ].concat([Array(15).fill({ q: "随机硬核题库B/C占位", options: [{ t: "选项A", score: 10, weight: "14" }, { t: "选项B", score: 0, weight: "1" }, { t: "选项C", score: 0, weight: "3" }, { t: "选项D", score: 0, weight: "11" }] })])
        };

        const PROFILES = {
            "1": { name: "1 号线 · 城市之脊", desc: "你是最可靠的先驱者，性格沉稳，是团队中不可或缺的定海神针。开通于2004年，承载着这座城市的最初记忆。", class: "line-1" },
            "2": { name: "2 号线 · 滨海格调", desc: "追求品质与安逸，性格温润如玉。你懂得享受生活，在繁忙中总能找到最优雅的平衡点。", class: "line-2" },
            "3": { name: "3 号线 · 独行侠客", desc: "特立独行，不惧外界眼光。即使环境复杂，你也能在高处俯瞰全局，走出自己的节奏。", class: "line-3" },
            "4": { name: "4 号线 · 枢纽之魂", desc: "精力充沛，社交能力极强。你是连接各方的纽带，总是在跨越边界，创造新的可能。", class: "line-4" },
            "5": { name: "5 号线 · 环中使者", desc: "思路开阔，擅长资源整合。你能够巧妙地连接看似无关的事物，达成最高效的目标。", class: "line-5" },
            "6": { name: "6 号线 · 光明极客", desc: "热衷于探索未知，对科技感和未来有着天然的向往。你是照亮黑暗的一道光。", class: "line-6" },
            "7": { name: "7 号线 · 蓝色绅士", desc: "冷静、专业、克制。你在细节中追求极致，用理性的力量解决最棘手的问题。", class: "line-7" },
            "8": { name: "8 号线 · 逐梦之人", desc: "内心永远住着大海。你浪漫、包容，在现实的琐碎中依然保留着对远方的向往。", class: "line-8" },
            "9": { name: "9 号线 · 深邃隐者", desc: "低调内敛，却有着惊人的深度。你不求站在聚光灯下，但你的贡献无可替代。", class: "line-9" },

            "12": { name: "12 号线 · 包容女王/王", desc: "极具同理心，社交圈极其广泛。你能包容所有的差异，将一切梳理得井然有序。", class: "line-12" },
            "13": { name: "13 号线 · 橙色活力", desc: "乐观开朗，永远带给人惊喜。你是那种还未登场就让人充满期待的焦点人物。", class: "line-13" },
            "14": { name: "14 号线 · 智能先锋", desc: "绝对的数字化原住民。你崇尚自动化和逻辑，用智慧重构生活的每一条路径。", class: "line-14" },
            "16": { name: "16 号线 · 人文守望", desc: "重视传统，情感细腻。在快节奏的时代里，你始终守护着那份温暖的乡愁和文化底蕴。", class: "line-16" },
            "20": { name: "20 号线 · 智行先行者", desc: "第一个吃螃蟹的人。你勇敢、果断，敢于在无人区开辟属于全人类的未来。", class: "line-20" }
        };

        // 状态管理
        let state = {
            view: 'menu',
            mode: 'easy',
            currentQuestions: [], // 当前随机抽中的题库
            currentIdx: 0,
            score: 0,
            weights: {},
            timer: null,
            timeLeft: 15
        };

        // 辅助工具：乱序数组
        const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const app = {
            init() { this.render(); },

            render() {
                const container = document.getElementById('main-container');
                container.innerHTML = '';
                if (state.view === 'menu') this.renderMenu(container);
                else if (state.view === 'quiz') this.renderQuiz(container);
                else if (state.view === 'result') this.renderResult(container);
            },

            renderMenu(container) {
                const high = localStorage.getItem('sz_metro_high_score') || 0;
                container.innerHTML = `
                    <div class="metro-gradient p-8 text-white text-center">
                        <h1 class="text-3xl font-bold mb-2">深圳地铁知识大测验</h1>
                        <p class="text-sm opacity-80 tracking-widest italic">智能多题库 · 选项随机版</p>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold text-gray-800">请选择难度</h2>
                            <div class="text-xs text-gray-400 bg-gray-100 px-3 py-1 rounded-full">最高纪录: ${high}</div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div onclick="app.startQuiz('easy')" class="cursor-pointer p-6 rounded-2xl border-2 border-green-100 bg-green-50 hover:border-green-500 transition-all">
                                <h3 class="text-lg font-bold text-green-700">🟢 入门版 (15题)</h3>
                                <p class="text-xs text-gray-500 mt-2">每次开始随机抽取 3 套题库之一</p>
                            </div>
                            <div onclick="app.startQuiz('hard')" class="cursor-pointer p-6 rounded-2xl border-2 border-red-100 bg-red-50 hover:border-red-500 transition-all">
                                <h3 class="text-lg font-bold text-red-700">🔴 硬核版 (15题)</h3>
                                <p class="text-xs text-gray-500 mt-2">涉及深度技术参数与车辆逻辑</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderQuiz(container) {
                const q = state.currentQuestions[state.currentIdx];
                // 打乱选项
                const shuffledOptions = shuffle(q.options);
                const progress = ((state.currentIdx + 1) / state.currentQuestions.length) * 100;
                
                container.innerHTML = `
                    <div class="p-8">
                        <div class="w-full h-1 bg-gray-100 rounded-full mb-6 overflow-hidden">
                            <div id="timer-bar" class="h-full bg-blue-500 w-full"></div>
                        </div>
                        <div class="flex justify-between items-end mb-8">
                            <div>
                                <span class="text-xs font-bold text-gray-400">Question ${state.currentIdx + 1} / 15</span>
                                <h3 class="text-sm font-black text-gray-700">系统已随机乱序选项</h3>
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-bold text-blue-600">${Math.round(progress)}%</span>
                            </div>
                        </div>
                        <div class="animate-slide">
                            <h2 class="text-xl font-bold text-gray-800 mb-8">${q.q}</h2>
                            <div id="options-container" class="grid grid-cols-1 gap-3"></div>
                        </div>
                    </div>
                `;
                
                const optionsBox = container.querySelector('#options-container');
                shuffledOptions.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "option-card w-full text-left p-4 rounded-xl border border-gray-100 bg-white hover:border-blue-500 hover:bg-blue-50 flex items-center group";
                    btn.onclick = () => this.submitAnswer(opt);
                    btn.innerHTML = `
                        <div class="w-7 h-7 rounded bg-gray-100 group-hover:bg-blue-600 group-hover:text-white flex items-center justify-center mr-4 text-xs font-bold">${String.fromCharCode(65+idx)}</div>
                        <span class="text-gray-700 font-medium">${opt.t}</span>
                    `;
                    optionsBox.appendChild(btn);
                });
                this.startTimer();
            },

            renderResult(container) {
                const high = localStorage.getItem('sz_metro_high_score') || 0;
                const isNewRecord = state.score > high;
                if (isNewRecord) localStorage.setItem('sz_metro_high_score', state.score);

                // 基于权重的本命线路计算
                let destinyId = "1";
                let maxW = -1;
                for (let id in state.weights) {
                    if (state.weights[id] > maxW) { maxW = state.weights[id]; destinyId = id; }
                }
                const profile = PROFILES[destinyId] || PROFILES["1"];

                container.innerHTML = `
                    <div class="p-10 text-center">
                        <div class="text-5xl font-black text-gray-900 mb-2">${state.score}</div>
                        <p class="text-sm text-gray-400">总得分 / Total Score</p>
                        ${isNewRecord ? '<div class="mt-2 inline-block px-3 py-1 bg-yellow-400 text-white text-xs font-bold rounded-full">NEW RECORD!</div>' : ''}
                        
                        <div class="mt-10 bg-white rounded-3xl p-8 border-l-8 text-left shadow-lg ${profile.class}">
                            <p class="text-xs text-gray-400 font-bold mb-1 uppercase tracking-widest">性格分析 · Spirit Route</p>
                            <h3 class="text-2xl font-black mb-4 text-gray-800">${profile.name}</h3>
                            <p class="text-gray-600 leading-relaxed text-sm italic">"${profile.desc}"</p>
                        </div>

                        <div class="mt-8 flex gap-3">
                            <button onclick="app.reset()" class="flex-1 py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-blue-900 transition-all">再测一次</button>
                            <button onclick="window.print()" class="px-6 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">打印证书</button>
                        </div>
                    </div>
                `;
            },

            startQuiz(mode) {
                state.view = 'quiz';
                state.mode = mode;
                // 从题库池中随机选择一套题库
                const pool = QUESTION_POOLS[mode];
                state.currentQuestions = pool[Math.floor(Math.random() * pool.length)];
                state.currentIdx = 0;
                state.score = 0;
                state.weights = {};
                this.render();
            },

            submitAnswer(opt) {
                clearInterval(state.timer);
                this.playBeep(opt.score > 0 ? 880 : 440);
                state.score += (opt.score || 0);
                if (opt.weight) state.weights[opt.weight] = (state.weights[opt.weight] || 0) + 1;
                state.currentIdx++;
                if (state.currentIdx < state.currentQuestions.length) setTimeout(() => this.render(), 200);
                else { state.view = 'result'; this.render(); }
            },

            startTimer() {
                clearInterval(state.timer);
                state.timeLeft = 15;
                const bar = document.getElementById('timer-bar');
                state.timer = setInterval(() => {
                    state.timeLeft--;
                    if (bar) bar.style.width = `${(state.timeLeft / 15) * 100}%`;
                    if (state.timeLeft <= 0) this.submitAnswer({ score: 0 });
                }, 1000);
            },

            reset() { state.view = 'menu'; this.render(); },

            playBeep(freq) {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } catch(e) {}
            }
        };

        app.init();
    </script>
</body>
</html>
